compute_environment: LOCAL_MACHINE
distributed_type: MULTI_GPU
downcast_bf16: "no"
gpu_ids: "2,3" # or specify like '0,1'
machine_rank: 0
main_process_port: 29501
main_training_function: main
mixed_precision: "no" # or 'fp16', 'bf16'
num_machines: 1
num_processes: 2 # Should match --num_processes in the launch command or be set by accelerate
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
